# Netlify configuration — static site, no build step.
[build]
  publish = "."

# Sensible security headers (kept non-restrictive so Google Fonts,
# Elfsight reviews, and Calendly all load fine).
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Always revalidate CSS so style updates show up immediately
# (Netlify still returns a fast 304 when nothing changed).
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
